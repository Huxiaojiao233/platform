spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/platform_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

platform:
  docker:
    image-name: "algo-runner:1.0"
    timeout-minutes: 10
    socket-path: "unix:///var/run/docker.sock"
  paths:
    algorithms: "./algorithms"
    datasets: "./datasets"
    tasks: "./tasks"

server:
  port: 8080

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
    disable-swagger-default-url: true
  packages-to-scan: com.iiesoftware.platform.controller
  paths-to-match: /api/**
