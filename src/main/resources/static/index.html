<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算法运行平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { max-width: 960px; }
        .nav-tabs { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">算法运行平台</h1>
        
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="algorithm-tab" data-bs-toggle="tab" data-bs-target="#algorithm" type="button" role="tab" aria-controls="algorithm" aria-selected="true">算法管理</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="task-tab" data-bs-toggle="tab" data-bs-target="#task" type="button" role="tab" aria-controls="task" aria-selected="false">任务运行</button>
            </li>
        </ul>
        
        <div class="tab-content" id="myTabContent">
            <!-- 算法管理 Tab -->
            <div class="tab-pane fade show active" id="algorithm" role="tabpanel" aria-labelledby="algorithm-tab">
                <div class="card mb-4">
                    <div class="card-header">注册新算法</div>
                    <div class="card-body">
                        <form id="uploadForm">
                            <div class="mb-3">
                                <label for="algoName" class="form-label">算法名称</label>
                                <input type="text" class="form-control" id="algoName" required>
                            </div>
                            <div class="mb-3">
                                <label for="algoDesc" class="form-label">描述</label>
                                <input type="text" class="form-control" id="algoDesc">
                            </div>
                            <div class="mb-3">
                                <label for="algoFile" class="form-label">脚本文件 (.py)</label>
                                <input type="file" class="form-control" id="algoFile" required>
                            </div>
                            <button type="submit" class="btn btn-primary">上传并注册</button>
                        </form>
                    </div>
                </div>
                
                <h3>已注册算法</h3>
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>名称</th>
                                <th>描述</th>
                                <th>创建时间</th>
                            </tr>
                        </thead>
                        <tbody id="algoList">
                            <!-- 动态填充 -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- 任务运行 Tab -->
            <div class="tab-pane fade" id="task" role="tabpanel" aria-labelledby="task-tab">
                <div class="card mb-4">
                    <div class="card-header">提交新任务</div>
                    <div class="card-body">
                        <form id="runForm">
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="selectAlgo" class="form-label">选择算法</label>
                                    <select class="form-select" id="selectAlgo" required>
                                        <option value="">加载中...</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="selectImage" class="form-label">选择镜像</label>
                                    <select class="form-select" id="selectImage" required>
                                        <option value="">加载中...</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="dataset" class="form-label">数据集名称</label>
                                    <input type="text" class="form-control" id="dataset" required placeholder="例如: dataA">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success w-100">运行任务</button>
                        </form>
                    </div>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3>任务列表</h3>
                    <button class="btn btn-sm btn-outline-secondary" onclick="loadTasks()">刷新列表</button>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>算法</th>
                                <th>镜像</th>
                                <th>状态</th>
                                <th>提交时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="taskList">
                            <!-- 动态填充 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 日志模态框 -->
    <div class="modal fade" id="logModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">任务日志</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <pre id="logContent" class="bg-light p-3 border rounded" style="white-space: pre-wrap; word-wrap: break-word;">加载中...</pre>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '/api';

        // 工具函数：获取状态颜色
        function getStatusColor(status) {
            switch(status) {
                case 'SUCCESS': return 'success';
                case 'FAILED': return 'danger';
                case 'RUNNING': return 'primary';
                case 'PENDING': return 'warning';
                default: return 'secondary';
            }
        }

        // 加载算法列表
        async function loadAlgorithms() {
            try {
                const res = await fetch(`${API_BASE}/algorithms`);
                if (!res.ok) throw new Error('Failed to fetch algorithms');
                const algos = await res.json();
                
                const tbody = document.getElementById('algoList');
                const select = document.getElementById('selectAlgo');
                
                tbody.innerHTML = '';
                select.innerHTML = '<option value="">请选择算法</option>';
                
                if (algos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center">暂无算法，请先上传</td></tr>';
                }
                
                algos.forEach(algo => {
                    // 更新表格
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${algo.id}</td>
                        <td>${algo.name}</td>
                        <td>${algo.description || '-'}</td>
                        <td>${new Date(algo.createdAt).toLocaleString()}</td>
                    `;
                    tbody.appendChild(row);
                    
                    // 更新下拉框
                    const option = document.createElement('option');
                    option.value = algo.id;
                    option.textContent = algo.name;
                    select.appendChild(option);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('algoList').innerHTML = `<tr><td colspan="4" class="text-danger">加载失败: ${err.message}</td></tr>`;
            }
        }

        // 加载镜像列表
        async function loadImages() {
            try {
                const res = await fetch(`${API_BASE}/images`);
                if (!res.ok) throw new Error('Failed to fetch images');
                const images = await res.json();
                
                const select = document.getElementById('selectImage');
                select.innerHTML = '<option value="">请选择镜像</option>';
                
                images.forEach(img => {
                    const option = document.createElement('option');
                    option.value = img.id;
                    option.textContent = `${img.name} (${img.tag})`;
                    select.appendChild(option);
                });
            } catch (err) {
                console.error(err);
            }
        }

        // 加载任务列表
        async function loadTasks() {
            try {
                const res = await fetch(`${API_BASE}/tasks`);
                if (!res.ok) throw new Error('Failed to fetch tasks');
                const tasks = await res.json();
                
                const tbody = document.getElementById('taskList');
                tbody.innerHTML = '';
                
                if (tasks.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">暂无任务</td></tr>';
                    return;
                }
                
                // 按时间倒序
                tasks.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                
                tasks.forEach(task => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${task.taskId}</td>
                        <td>${task.algorithm ? task.algorithm.name : 'Unknown'}</td>
                        <td>${task.image ? task.image.name : 'Unknown'}</td>
                        <td><span class="badge bg-${getStatusColor(task.status)}">${task.status}</span></td>
                        <td>${new Date(task.createdAt).toLocaleString()}</td>
                        <td>
                            <button class="btn btn-sm btn-info text-white" onclick="viewLogs('${task.taskId}')">查看日志</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('taskList').innerHTML = `<tr><td colspan="6" class="text-danger">加载失败: ${err.message}</td></tr>`;
            }
        }

        // 查看日志
        window.viewLogs = async function(taskId) {
            const modal = new bootstrap.Modal(document.getElementById('logModal'));
            document.getElementById('logContent').textContent = '正在加载日志...';
            modal.show();
            
            try {
                const res = await fetch(`${API_BASE}/tasks/${taskId}/logs`);
                if (res.ok) {
                    const logs = await res.text();
                    document.getElementById('logContent').textContent = logs || '暂无日志输出';
                } else {
                    document.getElementById('logContent').textContent = '无法获取日志';
                }
            } catch (err) {
                document.getElementById('logContent').textContent = '获取日志出错: ' + err.message;
            }
        };

        // 注册算法提交
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '上传中...';
            
            const formData = new FormData();
            formData.append('name', document.getElementById('algoName').value);
            formData.append('description', document.getElementById('algoDesc').value);
            formData.append('file', document.getElementById('algoFile').files[0]);

            try {
                const res = await fetch(`${API_BASE}/algorithms`, {
                    method: 'POST',
                    body: formData
                });
                
                if (res.ok) {
                    alert('算法注册成功');
                    e.target.reset();
                    loadAlgorithms(); // 刷新列表
                } else {
                    const error = await res.text();
                    alert('注册失败: ' + error);
                }
            } catch (err) {
                console.error(err);
                alert('注册出错: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });

        // 运行任务提交
        document.getElementById('runForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '提交中...';
            
            const algoId = document.getElementById('selectAlgo').value;
            const imageId = document.getElementById('selectImage').value;
            const dataset = document.getElementById('dataset').value;
            
            if (!algoId || !imageId || !dataset) {
                alert('请填写所有必填项');
                btn.disabled = false;
                btn.textContent = originalText;
                return;
            }

            try {
                // 使用 URLSearchParams 构建查询字符串
                const params = new URLSearchParams({
                    algorithmId: algoId,
                    imageId: imageId,
                    dataset: dataset
                });
                
                const res = await fetch(`${API_BASE}/tasks/run?${params.toString()}`, {
                    method: 'POST'
                });
                
                if (res.ok) {
                    alert('任务提交成功');
                    loadTasks(); // 刷新列表
                    // 不清空表单，方便重复提交
                } else {
                    const error = await res.text();
                    alert('提交失败: ' + error);
                }
            } catch (err) {
                console.error(err);
                alert('提交出错: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadAlgorithms();
            loadImages();
            loadTasks();
            
            // 每5秒自动刷新任务列表
            setInterval(loadTasks, 5000);
        });
    </script>
</body>
</html>
